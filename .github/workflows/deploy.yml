name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # deploy runs manual-only (see condition on the deploy job)

jobs:
  deploy:
    needs: [lint, test]
    # Auto-deploy on push is disabled: server runs system-python uvicorn while
    # deploy.sh assumed uv (mismatch). Re-arm once the pipeline is verified consistent.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/reviewforge
            git pull origin main
            bash scripts/deploy.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd backend && uv sync --frozen && uv run ruff check . && uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd backend && uv sync --frozen && uv run pytest -q
