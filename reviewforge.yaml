# ReviewForge 配置文件
# 环境变量优先级高于此文件

server:
  host: "127.0.0.1"
  port: 8000

llm:
  base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  model: "mimo-v2.5-pro"
  temperature_planner: 0.0
  temperature_reviewer: 0.1
  temperature_verifier: 0.0

  # 多模型路由 profiles
  # 不同 agent 可以使用不同的模型配置
  profiles:
    fast:
      model: "mimo-v2.5-pro"
      temperature: 0.0
      max_tokens: 4096
    accurate:
      model: "mimo-v2.5-pro"
      temperature: 0.0
      max_tokens: 8192

github:
  # 通过环境变量 GITHUB_TOKEN 和 GITHUB_WEBHOOK_SECRET 设置
  token: ""
  webhook_secret: ""

# 审查员配置
reviewers:
  - name: security_reviewer
    type: security
    enabled: true
    max_steps: 10
    confidence_threshold: 0.5

  - name: performance_reviewer
    type: performance
    enabled: true
    max_steps: 8
    confidence_threshold: 0.5

  - name: style_reviewer
    type: style
    enabled: true
    max_steps: 6
    confidence_threshold: 0.5

  - name: correctness_reviewer
    type: correctness
    enabled: true
    max_steps: 6
    confidence_threshold: 0.5

  - name: localization_reviewer
    type: localization
    enabled: true
    max_steps: 4
    confidence_threshold: 0.5

  - name: testing_reviewer
    type: testing
    enabled: true
    max_steps: 6
    confidence_threshold: 0.5

  - name: doc_reviewer
    type: documentation
    enabled: true
    max_steps: 5
    confidence_threshold: 0.5

  - name: dependency_reviewer
    type: dependency
    enabled: true
    max_steps: 6
    confidence_threshold: 0.5

  - name: accessibility_reviewer
    type: accessibility
    enabled: true
    max_steps: 6
    confidence_threshold: 0.5

# Skill 规则集目录
skills_dir: "skills"

# 事件日志目录
events_dir: ".reviewforge/events"

# 全局置信度阈值（低于此值的发现不发评论）
confidence_threshold: 0.5

# 仅安全审查启用证据工具循环；其他 Reviewer 直接消费预计算的 Impact Manifest。
# 实测 correctness/testing 工具循环成本接近翻倍且总体召回不稳定，因此保持单次模式。
agentic_reviewers:
  - security_reviewer
agentic_default: false

# Escalation：对不确定的 finding 自动用工具核实
escalation:
  enabled: true
  confidence_min: 0.4
  confidence_max: 0.7
  max_steps: 3
  max_tokens: 5000

# Final precision gate: every confirmed candidate must independently survive a
# repository-aware tool loop before it can be published.
publication_gate:
  enabled: true
  max_steps: 4
  max_tokens: 6000
  concurrency: 4

# 对首轮未覆盖的高风险变更符号做一次受限 correctness 二审。
# 二审只接受锚定到 Evidence Card 新增行且有足够置信度的具体缺陷。
coverage_gap:
  # The first production benchmark added cost without yielding a confirmed
  # finding. Keep the implementation available, but disable it until card
  # selection has benchmark evidence that it improves recall.
  enabled: false
  min_risk_score: 4
  max_cards: 3
  min_confidence: 0.65

# V3 coverage-driven pipeline. Evidence remains shadow-only until benchmarked.
v3:
  enabled: true
  coverage_min_risk_score: 0.15
  coverage_max_cells_per_round: 24
  coverage_max_attempts: 2
  evidence_mode: "off"
  evidence_max_candidates: 5
